name: dont_let_my_plants_die
description: "Weather forecast and alarm app for plant care."
publish_to: 'none'

version: 0.2.0

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flex_color_scheme: ^8.2.0
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.3.0
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  flutter_local_notifications: ^19.2.0
  workmanager: ^0.9.0
  uuid: ^4.5.1
  timezone: ^0.10.0
  url_launcher: ^6.3.1
  package_info_plus: ^10.1.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
